<div id="head">
  <div id="headBg">
    <div id="headOrangeTop"></div>
    <img id="banner" src="" alt="RuneScape" width="766" height="143">

    <!--SCRIPT: MONTHLY BANNER-->
    <script type="text/javascript">
      document.getElementById("banner").src = `/site/2009scape-resources/img/banners/banner.webp`;
      //document.getElementById("banner").src = `/site/2009scape-resources/img/banners/${new Date().getMonth() + 1}.webp`;
    </script>

    <div id="headImage"><a href="/" id="logo_select"></a>
    <div id="player_no">
  <span class="brandingColor">Taco Shack</span>: Reality made true by Chat GPT |
  Players online: <span id="live-player-count">0</span>
        </div>
      </div>
    </div>
    <div id="headOrangeBottom"></div>

    <script type="text/javascript">
      async function refreshPlayerCount() {
        try {
          const response = await fetch("https://157.151.216.205:8086/status", { cache: "no-store" });
          const data = await response.json();
          document.getElementById("live-player-count").textContent = data.online;
        } catch (error) {
          document.getElementById("live-player-count").textContent = "Offline";
        }
      }

      refreshPlayerCount();
      setInterval(refreshPlayerCount, 15000);
    </script>

    <!-- End of Banner -->
    <div id="menubox">
      {% include menu.html %}
    </div>
  </div>
</div>
